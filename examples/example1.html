<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Note Sequence Selector Example</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark light;
      }
      note-sequence-selector {
        font-family: "Noto Music", sans-serif;
        font-weight: 400;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <h2>Select a Note Sequence</h2>
    <note-sequence-selector
      selected-note-sequence-theme-key="dorian"
    ></note-sequence-selector>
    <script type="module" src="../dist/bundle.js"></script>
    <script type="module">
      document.body.addEventListener("note-sequence-selected", (event) => {
        console.log("note-sequence selected:", event.detail);
      });
    </script>
  </body>
</html>
